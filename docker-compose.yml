services:
  api:
    build:
      context: ./frontend/Greening-India-Assingment
      dockerfile: Dockerfile
      target: api
    container_name: taskflow-api
    ports:
      - "4000:4000"
    volumes:
      - ./frontend/Greening-India-Assingment/mock-api/db.json:/data/db.json
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend/Greening-India-Assingment
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: taskflow-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

